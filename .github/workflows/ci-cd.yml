name: CI/CD — Tomita API

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '18'
  TF_VERSION: '1.5.7'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Pruebas unitarias y validación de código
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Pruebas y Validación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}



      - name: Instalar dependencias
        working-directory: app
        run: npm install

      - name: Ejecutar pruebas unitarias con cobertura
        working-directory: app
        run: npm test
        env:
          NODE_ENV: test
          # Sin DB_HOST → el código usa datos mock (no necesita RDS real)

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Validación de infraestructura Terraform
  # ═══════════════════════════════════════════════════════════════
  terraform-validate:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan (dry-run)
        working-directory: terraform
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="key_name=tomita-key" \
            -out=tfplan \
            -no-color
        # SECRETO: La contraseña de DB nunca se expone en logs
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Guardar plan como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — Aplicar infraestructura (solo en push a main)
  # ═══════════════════════════════════════════════════════════════
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # requiere aprobación manual en GitHub

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="key_name=tomita-key" \
            -auto-approve \
            -no-color
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Obtener outputs de Terraform
        working-directory: terraform
        run: terraform output -no-color

      - name: Verificar endpoint de salud
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "ALB DNS: $ALB_DNS"
          # Esperar 3 minutos para que las instancias levanten
          echo "Esperando 180s para que EC2 inicialice..."
          sleep 180
          # Verificar health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health" --max-time 30 || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Servicio UP y respondiendo correctamente"
          else
            echo "ADVERTENCIA: El servicio aun no responde (puede necesitar mas tiempo)"
          fi